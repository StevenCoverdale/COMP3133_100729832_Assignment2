<div class="page">
  <h2>Employees</h2>

  <button (click)="add()">Add Employee</button>

  <table *ngIf="!loading">
    <thead>
      <tr>
        <th>First</th>
        <th>Last</th>
        <th>Email</th>
        <th>Dept</th>
        <th>Position</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let e of employees">
        <td>{{ e.firstName }}</td>
        <td>{{ e.lastName }}</td>
        <td>{{ e.email }}</td>
        <td>{{ e.department }}</td>
        <td>{{ e.position }}</td>
        <td>
          <button (click)="view(e.id)">View</button>
          <button (click)="edit(e.id)">Edit</button>
          <button (click)="delete(e.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="loading">Loading...</p>
</div>
